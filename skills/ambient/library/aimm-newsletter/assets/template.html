<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#e8eef5; font-family: Arial, Helvetica, sans-serif; color:#222;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#e8eef5; padding:30px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff; max-width:600px;">

          <!-- Header -->
          <tr>
            <td style="background-color:#2c4d6e; padding:30px 20px; text-align:center;">
              <h1 style="margin:0; color:#ffffff; font-size:26px; font-weight:bold;">Your Organization Name</h1>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="border-bottom:1px solid #f5d6d6; height:1px; line-height:1px; font-size:1px;">&nbsp;</td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px; font-size:16px; line-height:1.6; color:#222;">
              {{BODY_HTML}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#9aafc4; padding:25px 40px; font-size:14px; color:#1a1a1a;">
              <p style="margin:0 0 12px 0; font-style:italic;">Copyright &copy; 2026 Your Organization Name. All rights reserved.</p>
              <p style="margin:0 0 4px 0;">Want to change how you receive these emails?</p>
              <p style="margin:0;">You can <a href="https://YOUR_UNSUBSCRIBE_URL" style="color:#1a1a1a; text-decoration:underline;">unsubscribe from this list</a>.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
