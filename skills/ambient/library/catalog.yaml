# Domain skill catalog — the ONLY file the router reads to choose a skill.
# Keep each description to one line. The router matches against these
# descriptions, then loads exactly ONE skill's instructions.md. It must never
# read multiple skill bodies to decide relevance.
#
# Format:
#   <skill-name>: <one-line description of when it applies>

skills:
  project-brief: Creates a one-page project overview; use for "write a brief", "summarize this project", "project overview", "what is this project".
  researcher: Gathers sources into a structured research dossier; use for "research this topic", "find sources on X", "compile background". NOT for writing or editing the piece.
  writer: Drafts a piece from a brief (and optional dossier) — drafting ONLY, no research or editing pass; use for "draft this", "write a first draft from these notes", "turn this brief into a post".
  editor: Surgically edits an EXISTING draft; use for "edit this draft", "polish this", "tighten this article". Requires a draft to already exist.
  writing-team: Full research -> draft -> edit pipeline to a publish-ready piece; use for "write me an article on X end to end", "take this from idea to finished post". Use this when the user wants the whole pipeline, not a single stage.
  context-mgr: Installs the multi-agent .context/ continuity system into a project; use for "install context-mgr", "set up multi-agent context here", "scaffold .context/", "add the shared brain to this project".
  session: Runs session check-in/check-out against a project's .context/ store; use for "what should I work on", "resume work", "checkpoint", "save progress", "wrap up", "session check-in/check-out". Requires (or offers to bootstrap) a .context/ directory.
