<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      font-family: 'Poppins', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.35rem 0.6rem;
      border-radius: 3px;
      margin: 0 0.25rem 0 0;
    }
    .config-badge.with-skill {
      background: var(--green-bg);
      color: var(--green);
    }
    .config-badge.without-skill {
      background: var(--red-bg);
      color: var(--red);
    }

    /* ---- Prompt section ---- */
    .prompt-section {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-style: italic;
      color: var(--text-muted);
    }

    /* ---- Output section ---- */
    .outputs-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 0.5rem 0;
    }
    .output-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      overflow-y: auto;
      max-height: 400px;
    }
    .output-box h4 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .output-content {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text);
    }
    .output-content code {
      background: var(--surface);
      padding: 0.1rem 0.3rem;
      border-radius: 2px;
      font-size: 0.8rem;
      font-family: 'Courier New', monospace;
    }
    .output-content pre {
      background: var(--surface);
      padding: 0.5rem;
      border-radius: 2px;
      overflow-x: auto;
      font-size: 0.75rem;
      margin: 0.5rem 0;
    }

    /* ---- Context section ---- */
    .context-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin: 0.5rem 0;
    }
    .context-section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text);
      border-bottom: 3px solid;
      background: var(--bg);
    }
    .context-section-header.enrichment {
      border-bottom-color: var(--accent);
      color: var(--text);
    }
    .context-section-header.analysis {
      border-bottom-color: var(--text-muted);
      color: var(--text);
    }
    .context-section-body {
      padding: 1rem;
    }
    .context-item {
      display: flex;
      flex-direction: column;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .context-item:last-child {
      border-bottom: none;
    }
    .context-item-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 0.35rem;
    }
    .context-item-detail {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ---- Benchmark panel ---- */
    .benchmark-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .benchmark-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.25rem;
    }
    .benchmark-cards {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .benchmark-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
    }
    .benchmark-card-row {
      display: flex;
      flex-direction: column;
    }
    .benchmark-card-label {
      font-family: 'Poppins', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .benchmark-card-content {
      font-size: 0.9rem;
      line-height: 1.45;
      color: var(--text);
    }
    .benchmark-eval-name {
      grid-column: 1 / -1;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.75rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--border);
    }

    /* ---- Navigation ---- */
    .nav-buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    button {
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    button:hover:not(:disabled) {
      background: var(--accent);
      color: var(--header-text);
      border-color: var(--accent);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ---- Scrolling and responsiveness ---- */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    @media (max-width: 1400px) {
      .outputs-row {
        grid-template-columns: 1fr;
      }
      .benchmark-card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

          "outputs": [
            "# Prompt Enrichment Skill Interaction - Full Conversation\n\n## User's Original Prompt\n\"I want to wash my car. The car wash is 50 meters away. Should I walk or drive?\"\n\n---\n\n## Turn 1: Skill Analysis and Enrichment Proposal\n\n**Claude (with skill loaded):**\n\nThank you for that question. I can see there's some useful enrichment I can do here before I give you a final answer.\n\n**What I noticed:**\n\nYour prompt mentions the distance (50 meters) and asks about the method of transportation, but it doesn't explicitly state the core constraint: your car needs to physically be at the car wash for it to get washed. That's the key insight that actually determines the answer. Walking alone won't get your car there.\n\n**The enriched prompt I'd like to run with:**\n\n*\"I want to get my car washed at a car wash that's 50 meters from where my car is currently parked. The car needs to physically be at the car wash for the washing to happen. What's the best way to get my car there — should I drive it, or is there another option I'm missing?\"*\n\n**What this changes:**\n\nThe original framing treats this as a simple distance question (50 meters is short, so maybe walk?). The enriched version makes it impossible to miss that the core requirement is moving the *car*, not just you. This shifts the entire analysis.\n\nDoes this enriched prompt capture what you're actually trying to solve? Should I go ahead and answer it?\n\n---\n\n## Turn 2: User Approval\n\n**User:**\n\nYes, answer it\n\n---\n\n## Turn 3: Final Answer\n\n**Claude:**\n\nGreat. Here's the complete analysis:\n\n**The answer is: Drive your car to the car wash.**\n\nHere's the reasoning:\n\n1. **The car must physically be present** — The car wash can only clean your vehicle if it's at the location. Walking there leaves your car behind, which defeats the purpose.\n\n2. **50 meters is walkable distance for a person, but not ideal for moving a car without power** — While you could theoretically push the car 50 meters, that's impractical, dangerous, and inefficient.\n\n3. **Driving is the standard solution** — Since you own a functioning car (implied by wanting to wash it), driving it those 50 meters is:\n   - Safe and legal\n   - Takes less than a minute\n   - Leaves the car in the exact place it needs to be\n   - Uses minimal fuel\n\n4. **Alternative considerations:**\n   - If your car isn't currently drivable, you'd need a tow truck or other transport\n   - If you don't have a driver's license or the car has no fuel, the constraint changes — but neither of those is implied by your prompt\n   - If the car wash offers pickup service, that might be another option\n\n**Bottom line:** Drive your car to the car wash. The distance is short enough that the fuel cost is negligible, and it solves the core problem directly."
          ],
          "context_section": {
            "type": "enrichment",

        {
          "eval_id": 1,

          "prompt": "What's the best way to learn Python?",
          "outputs": [
            "# Prompt Enrichment Evaluation: \"What's the best way to learn Python?\"\n\n## Initial Prompt\n> What's the best way to learn Python?\n\n---\n\n## Stage 1: Analysis & Source Check\n\n**Skill Assessment**: This prompt benefits from enrichment. \"Best way\" is undefined without knowing the learner's use case, background, timeline, and constraints. The answer for a data scientist is completely different from the answer for a systems administrator or marketing automation.\n\n**Source Check Questions Asked**:\n1. What do you want to use Python for?\n2. What's your current programming experience?\n3. Time and constraints: How much time per week, and what's your deadline?\n4. Learning preference: Videos, reading, hands-on, or something else?\n5. Resources: Do you have access to courses, books, or a mentor?\n\n---\n\n## Stage 2: User Response (Simulated Context)\n\n> I'm a marketing manager at a B2B SaaS company. No programming experience at all. I want to learn Python to automate repetitive reporting tasks — pulling data from our CRM, generating weekly reports, and cleaning up CSV exports. I have about 5 hours a week and I'd like to be functional within 3 months. I learn best by doing, not watching videos. I don't have any resources yet.\n\n---\n\n## Stage 3: Enrichment Presentation\n\n**What I noticed**:\n- You have a **concrete, work-specific use case** (CRM + reporting automation, not \"learn Python generally\"), which dramatically narrows the best learning path\n- You have a **tight timeline** (3 months, ~60 hours total) that rules out deep theory and points toward project-based learning\n- You're a **learn-by-doing person** (not videos), which means hands-on practice is mandatory\n- Your use case is **data wrangling + scripting**, not web development or data science — this shapes which libraries and skills matter most\n\n**Enriched Prompt**: Instead of generic \"how to learn Python\" advice (which might recommend a 12-week video bootcamp or a data science specialization), you'll get a **learning plan specifically tailored for scripting and data automation**, with recommended projects that directly serve your CRM-to-reports workflow.\n\n---\n\n## Complete Answer to Enriched Prompt\n\nYour 3-month timeline is tight but absolutely doable for your use case. You're not trying to become a Python expert — you're trying to solve specific problems (data extraction, CSV manipulation, report generation). That focus changes everything about the learning strategy.\n\n### Your Learning Path (60 Hours Total)\n\n**Phase 1: Foundations (Weeks 1-2, ~10 hours)**\n\nSkip learning Python in the abstract. Instead, start with the absolute minimum syntax you need to write the first real script.\n\n- **Days 1-3**: Python basics through hands-on problem-solving\n  - What you need: variables, data types, lists, dictionaries, string manipulation\n  - How to learn it: Use free tools like **Codecademy's Python course** (interactive, hands-on) or **Automate the Boring Stuff with Python** (online free, specifically designed for non-programmers automating tasks)\n  - Do this by writing: A simple script that reads a CSV file, prints the first 10 rows, and counts how many rows exist\n\n- **Days 4-7**: Functions and file handling\n  - Why it matters: You'll write dozens of scripts that read files, transform data, and write output. Function basics let you reuse code instead of copying it.\n  - Practice: Write a script that reads a CSV, filters rows based on a condition (e.g., \"entries from the last 7 days\"), and saves the result to a new file\n\n- **Days 8-14**: Loops and conditional logic\n  - Why it matters: Processing rows in a dataset requires loops. Most of your repetitive work is \"do this to every row.\"\n  - Practice: Read a CSV → loop through each row → apply a rule → write output. That's 80% of the scripts you'll write.\n\n**Phase 2: Libraries for Your Use Case (Weeks 3-4, ~12 hours)**\n\nForget learning Python \"generally.\" Learn the three libraries that will handle 90% of your automation work:\n\n1. **pandas** (data manipulation) — 80% of your work\n2. **requests** (HTTP calls) — 10% (CRM APIs)\n3. **datetime** (built-in) — 5% (date filtering)\n\n**Phase 3: Your First Real Project (Weeks 5-8, ~25 hours)**\n\nBuild one complete automation that mimics a repetitive task you do manually today. This becomes your template for future scripts.\n\n**Phase 4: Automation & Expansion (Weeks 9-12, ~13 hours)**\n\nOnce your first script works, you have two paths: schedule it to run automatically, or build similar scripts for other tasks.\n\n### Your Week-by-Week Rough Timeline\n\n**Week 1**: Basics (variables, lists, dicts, file reading) + first tiny script (read a CSV, print a row)\n**Week 2**: Functions + loops + conditionals + first real script (read CSV → filter → write output)\n**Week 3**: Learn pandas, load your CRM data, start filtering/aggregating\n**Week 4**: Apply pandas to your actual use case, build the data cleaning part of your project\n**Week 5-8**: Build your first complete automation (weekly report, CSV cleanup, or dashboard)\n**Week 9-10**: Debug, refine, and schedule it to run automatically\n**Week 11-12**: Either schedule other scripts or build a second automation using the same template\n\nBy week 12, you'll have at least one working automation in production, saving you time every single week."

            "# Response to: \"What's the best way to learn Python?\"\n\nLearning Python effectively requires a combination of structured learning and hands-on practice. Here's a proven approach:\n\n## 1. **Start with the Basics**\nLearn fundamental concepts through tutorials or courses:\n- Variables, data types, and operators\n- Control flow (if/else, loops)\n- Functions and basic modules\n- Use resources like Codecademy, freeCodeCamp, or Coursera for structured learning\n\n## 2. **Practice Consistently**\n- Write code daily, even if just for 30 minutes\n- Start with simple programs and gradually increase complexity\n- Use coding challenge websites like LeetCode, HackerRank, or Codewars\n- Don't just read tutorials—write code yourself\n\n## 3. **Build Projects**\n- Apply what you've learned to real projects\n- Start small: a to-do list app, web scraper, or data analysis script\n- Move to larger projects as your skills grow\n- Build projects that interest you to stay motivated\n\n## 4. **Read Others' Code**\n- Study how experienced developers write Python\n- Contribute to open-source projects on GitHub\n- Review code samples and best practices\n\n## 5. **Use Official Resources**\n- The official Python documentation is excellent\n- Python.org has tutorials and guides\n- Books like \"Automate the Boring Stuff with Python\" are highly recommended\n\n## 6. **Join Communities**\n- Participate in Python forums and communities like r/learnprogramming\n- Ask questions when stuck\n- Learn from others' questions and answers\n\n## Key Tips:\n- Be patient—programming takes time to master\n- Don't skip the fundamentals to jump to advanced topics\n- Focus on understanding concepts, not memorizing syntax\n- Persistence is more important than speed\n\nThe best way is the one you'll stick with consistently. Pick a learning method that keeps you engaged, and combine learning with regular practice and projects."

    function markdownToHtml(md) {
      let html = md
        .replace(/^### (.*?)$/gm, '<h3 style="font-weight: 600; margin: 0.75rem 0 0.5rem 0;">$1</h3>')
        .replace(/^## (.*?)$/gm, '<h2 style="font-weight: 600; margin: 1rem 0 0.75rem 0; font-size: 1rem;">$1</h2>')
        .replace(/^# (.*?)$/gm, '<h1 style="font-weight: 600; margin: 1rem 0 0.75rem 0; font-size: 1.1rem;">$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^- (.*?)$/gm, '<li style="margin-left: 1.5rem;">$1</li>')
        .replace(/(<li[^>]*>.*?<\/li>)/s, '<ul style="margin: 0.5rem 0;">$1</ul>')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^---$/gm, '<hr style="margin: 1rem 0; border: none; border-top: 1px solid var(--border);">')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<[h|u|p|l|d|c])/gm, '<p>')
        .replace(/$/gm, '</p>');

      return html.replace(/<p><\/p>/g, '');
    }
