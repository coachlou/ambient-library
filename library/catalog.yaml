# Domain skill catalog — the ONLY file the router reads to choose a skill.
# Keep each description to one line. The router matches against these
# descriptions, then loads exactly ONE skill's instructions.md. It must never
# read multiple skill bodies to decide relevance.
#
# Format:
#   <skill-name>: <one-line description of when it applies>
#
# Namespaces group related skills. They are logical only — folders stay flat.
# They group by FUNCTION (the job to be done), never by team, brand, or
# expertise — see docs/MANAGEMENT.md "Choosing the axis".
# The router uses them to disambiguate within a family, and a project's
# skills-manifest.yaml may scope by namespace instead of listing skills.
# A namespace earns a folder of its own (with its own instructions.md and
# catalog) only when its members need SHARED BEHAVIOR — see
# docs/MANAGEMENT.md "Namespaces".

namespaces:
  writing: [writer, editor, researcher, writing-team, brand-writing-team, aimm-writing-team, voice-profile-trainer, editorial-desk]
  thinking: [cognitive-operations, eigenthinking, latent-cartographer, paradigm-collision-engine, deep-field, enrich-prompt]
  sessions: [session, wrap, extract-codify-patterns, conversation-ip-extractor, meeting-nuggets]
  audit: [audit-fix, audit-mcp, fresh-eyes, grill]

skills:
  project-brief: Creates a one-page project overview; use for "write a brief", "summarize this project", "project overview", "what is this project".
  researcher: Gathers sources into a structured research dossier; use for "research this topic", "find sources on X", "compile background". NOT for writing or editing the piece.
  writer: Drafts a piece from a brief (and optional dossier) — drafting ONLY, no research or editing pass; use for "draft this", "write a first draft from these notes", "turn this brief into a post".
  editor: Surgically edits an EXISTING draft; use for "edit this draft", "polish this", "tighten this article". Requires a draft to already exist.
  writing-team: Full research -> draft -> edit pipeline to a publish-ready piece; use for "write me an article on X end to end", "take this from idea to finished post". Use this when the user wants the whole pipeline, not a single stage.
  context-mgr: Installs the multi-agent .context/ continuity system into a project; use for "install context-mgr", "set up multi-agent context here", "scaffold .context/", "add the shared brain to this project".
  session: Runs session check-in/check-out against a project's .context/ store; use for "what should I work on", "resume work", "checkpoint", "session check-in/check-out". Requires (or offers to bootstrap) a .context/ directory.
  aimm-newsletter: Sends a newsletter email to all members of a named Google Contacts group; use for "send this to [group]", "send the newsletter", "email the group". Previews recipients and content before sending.
  aimm-writing-team: Autonomous multi-role team (Researcher, Strategist, Writer, Editor, Publisher) for thought-leadership articles; use for explicit role commands like "Use Strategist mode" or a full AIMM article run.
  audit-fix: Adversarial six-lens audit (errors, omissions, oversights, blind spots, conflicts, duplications) of a plan or change, then root-cause fixes; use for "audit this", "pressure test", "poke holes", "what did we miss".
  audit-mcp: Security-audits a third-party MCP server repo before installation; use for "audit this MCP", "is this MCP safe", "check this repo before I install it".
  brand-writing-team: Multi-role team for brand-building long-form content with structured intake, end to end; use for "help me write a post about X", "turn this idea into a piece" when the goal is personal/company brand.
  cognitive-operations: Applies the Lenses/Operations/Recipes structured-thinking system to complex problems and decisions; use for "think through", "what am I missing", "run a pre-mortem", "use mental models".
  conversation-consolidation-system: Builds a four-stage pipeline turning scattered Claude chat history into a searchable Obsidian external brain; use for "I can't find what I discussed with Claude", "second brain for my AI work".
  conversation-ip-extractor: Extracts named frameworks, methodologies, and publishable IP from a long conversation or session transcript; use for "what did I figure out here", "find the framework in this".
  deep-comprehension-assessment: Builds rigorous text-comprehension assessments with detailed feedback; use for "test my understanding of this text", "comprehension quiz".
  deep-field: Integrated insight system combining Eigenthinking, latent-space cartography, and wisdom-of-crowds validation; use for "run deep field", frontier-quality insight beyond default reasoning.
  eigenthinking: Nine-step framework turning tacit expertise into branded, publishable IP (UP to IP); use for "turn how I think into a framework", "package my methodology", "make my process teachable".
  enrich-prompt: Rewrites and augments a prompt to surface implicit constraints and blind spots, then answers the enriched version; use for "make this prompt better", "I keep getting shallow answers".
  extract-codify-patterns: Packages a working session into a shareable look-over-my-shoulder artifact bundle; use for "package this session", "codify this session", "turn this conversation into a teaching resource".
  fresh-eyes: Validates docs/onboarding/workflows by spawning a zero-context agent to walk through them cold, then fix-and-respawn; use for "fresh eyes", "does the onboarding work", "test the docs".
  geo-authority-architect: Builds a GEO/AI-citation authority strategy and Canon/Frameworks/Diagnostics content architecture; use for "GEO strategy", "get cited by AI", "GEARS".
  grill: Converges on a decision or spec via one high-leverage question at a time with a decisions ledger, then executes; use for "grill me", "interview me", "ask me questions one at a time".
  ireport: Generates styled, interactive HTML research reports from a topic or notes; use for "interactive report", "HTML report on X", "deep research document".
  irreplaceable-edge: Guided live discovery of a professional's irreplaceable competitive edge against AI-first competition; use for "find my edge", "what's my moat", "how do I compete with AI".
  knowledge-base-architect: Guides design and deployment of a personal AI knowledge base from accumulated expertise assets; use for "talk to my own knowledge", "build a private ChatGPT on my material".
  latent-cartographer: Multi-phase latent-space traversal that maps the probability landscape before answering; use for "/lsc", "run the cartographer", "don't give me the median answer".
  leaderize-storytelling-framework: Selects and applies storytelling frameworks for Leaderize's mid-level-leader audience across content stages and live sessions; use for Leaderize content or session design.
  meeting-nuggets: Turns meeting transcripts into newsletter-style topic recaps with research add-ons and optional Notion publishing; use for "recap this meeting", "session report", or any pasted VTT/call transcript.
  multi-model-debate-live: Orchestrates a live human-steered Claude/Gemini/Codex debate against one shared markdown file; use for "three-pane terminal", "run the models against each other" — the live workflow, not the prompt protocol.
  paradigm-collision-engine: Generates non-obvious insight by colliding 400+ disciplinary paradigms via parallel sub-agents and an elimination tournament; use for "fresh angle on X", "non-obvious take", "multiple lenses".
  polyglot-language-coach: Gently coaches when the user writes in a non-English language mid-conversation — corrects, teaches, logs, returns to task; applies whenever the user code-switches as practice.
  transcript-to-content-pipeline: Turns a raw transcript or session notes into a full content package (article, LinkedIn variants, summary, audio script); use for "turn this into content", "write something from this transcript".
  voice-crm-pipeline: Builds a hands-free voice-to-database capture chain (Siri to Shortcut to GPT to Sheets); use for "I never update my CRM", "talk to my database", "voice-to-sheet workflow".
  voice-profile-trainer: Derives a reusable voice profile from authentic writing samples so AI output sounds like the user; use for "doesn't sound like me", "write in my voice", "set up my voice profile".
  wrap: Full session close-out ritual — commit, export conversation, teaching narrative, handoff, memory harvest; use for "wrap up", "close out", "export this conversation". For a plain .context/ checkpoint, prefer session.
  aimm-commands: Library of 54 named AIMM prompt commands (skeptic, canon-lock, blind-spot-scanner, transcript-miner, ...); use for "/aimm:<name>", "run the skeptic", or any request naming an AIMM command.
  trello-pipeline: Trello-based agentic product pipeline turning an idea into a PRD via staged AI agents on a live board; use for "run the Trello pipeline", "idea to PRD on my board", "set up the TrelloAgents board".
  editorial-desk: Senior-editor orchestrator running specialist contributors (strategist, angle, drafter, adversary, headline) over a shared blackboard; use for "run the editorial desk", a critiqued-and-revised opinion/POV essay, or a sharp argument piece with editorial review.
  to-issues: Breaks a plan, spec, or PRD into independently-grabbable tracer-bullet issues on the project's issue tracker; use for "turn this plan into issues", "break this PRD into tickets".
  harness-prd: Interviews the user to design a stateful-agent-harness ProcessSpec (a state machine of agents, skills, gates, artifacts); use for "build an agent process for X", "spec out an agent pipeline". NOT for code work-breakdowns (wbs-prd).
  graphify: Turns any folder of files into a persistent, queryable knowledge graph with community detection; use for codebase/architecture questions, "graphify this", or any content query when graphify-out/ exists.
  gmail-triage: Two-phase Gmail inbox sweep via the gmail MCP — batch-archive junk, then triage real emails one at a time; use for "check my email", "clean up my inbox".
  gmail-manager: General Gmail management across accounts via the gmail MCP (search, read, send, label, archive, drafts); use for "send an email", "find that thread", or mailbox actions beyond triage.
